# ─────────────────────────────────────────────────────────────────────────────
# IELTS Studio 后端配置文件
# 敏感字段（数据库密码、API Key 等）在生产环境中请通过环境变量注入，不要明文提交到 Git
# 示例：password: ${DB_PASSWORD}
# ─────────────────────────────────────────────────────────────────────────────

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api   # 所有接口统一加 /api 前缀

spring:
  application:
    name: ielts-studio-backend
  config:
    # 优先加载 application-ai.yml（AI provider 配置）；
    # 再尝试加载本地 .env（可选，用于本地调试，已在 .gitignore 中忽略）。
    # - 从 backend/ 目录运行 mvn spring-boot:run 时，根目录 .env 位于 ../.env
    # - 从根目录运行打包 jar 时，.env 位于当前目录
    # .env 中的 KEY=VALUE 会作为 Spring 属性加载，覆盖下方开发默认值。
    import:
      - classpath:application-ai.yml
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]

    # ─── 数据库连接（MySQL 8）────────────────────────────────────────────────────
  # 生产环境通过 DB_URL / DB_USERNAME / DB_PASSWORD 环境变量注入；
  # 本地开发：复制根目录 .env.example 为 .env，填入实际值后直接 mvn spring-boot:run 即可（无需 profile）。
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ielts_studio?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}   # 生产环境必须通过 DB_PASSWORD 注入强密码，禁止使用 root/空密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 50    # 最大连接数（压测瓶颈优化：20→50）
      minimum-idle: 10         # 最小空闲连接数
      connection-timeout: 30000

  # ─── Redis 缓存（可选）──────────────────────────────────────────────────────
  # 仅当 app.redis.enabled=true 时才会实际连接 Redis；
  # 不配置 APP_REDIS_ENABLED 或设为 false 时走单机内存限流，不连接 Redis。
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:127.0.0.1}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}   # 生产环境建议设置 Redis 密码
      database: ${SPRING_DATA_REDIS_DATABASE:0}
      lettuce:
        pool:
          max-active: 16
          max-idle: 8
          min-idle: 1
      timeout: 2s

  # ─── 文件上传大小限制 ────────────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 50MB     # 单文件最大 20MB
      max-request-size: 55MB  # 单次请求最大 25MB
# Feature flags（默认不开启 Redis，需显式设置 APP_REDIS_ENABLED=true）
app:
  redis:
    # 缺省（不设置 APP_REDIS_ENABLED）时为 false，使用单机内存限流；
    # 设置 APP_REDIS_ENABLED=true 启用 Redis 分布式限流（多实例共享计数）。
    enabled: ${APP_REDIS_ENABLED:false}
  cors:
    # 生产环境必须通过 CORS_ALLOWED_ORIGINS 注入实际前端域名（逗号分隔），
    # 例如：https://example.com,https://www.example.com
    # 留空时仅允许 localhost / 127.0.0.1 / [::1]（仅适用于本地开发）。
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

# ─── MyBatis-Plus 配置 ──────────────────────────────────────────────────────
mybatis-plus:
  type-aliases-package: com.ieltsstudio.entity
  configuration:
    map-underscore-to-camel-case: true        # 数据库下划线字段自动映射为驼峰
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl   # 生产环境已关闭，开发时取消注释
  global-config:
    db-config:
      id-type: auto            # 主键自增
      logic-delete-field: deleted       # 逻辑删除字段名
      logic-delete-value: 1             # 已删除标记值
      logic-not-delete-value: 0         # 未删除标记值

# ─── JWT 配置 ────────────────────────────────────────────────────────────────
jwt:
  # ⚠️ 生产环境必须通过 JWT_SECRET 环境变量注入 64 位以上随机字符串；
  # 下方默认值仅用于本地开发，禁止用于生产。
  secret: ${JWT_SECRET:ielts-studio-jwt-secret-key-2024-very-secure-please-change-in-production}
  expiration: 604800000        # Token 有效期：7 天（毫秒）
  refresh-expiration: 2592000000  # 刷新 Token 有效期：30 天（毫秒，预留）


# ─── MinIO 对象存储（可选）──────────────────────────────────────────────────────
# 当前版本文件以字节数组方式在内存中处理，MinIO 为预留扩展项。
# 如启用，生产环境必须通过环境变量替换默认 minioadmin/minioadmin123。
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin123}   # ⚠️ 生产环境必须替换
  bucket-name: ${MINIO_BUCKET_NAME:ielts-studio}

# ─── 日志级别 ─────────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.ieltsstudio: INFO      # 项目自身日志：只输出 INFO 及以上
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.apache.tomcat: WARN
    com.zaxxer.hikari: WARN
