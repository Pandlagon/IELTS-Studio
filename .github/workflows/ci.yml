name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Backend: mvn test + package jar artifact
  # ─────────────────────────────────────────────────────────────────────────
  backend-test:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run backend tests
        run: |
          cd backend
          mvn -B test

      - name: Package backend jar (skip tests)
        run: |
          cd backend
          mvn -B package -DskipTests

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: ielts-studio-backend-jar
          path: backend/target/*.jar
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Frontend: npm ci + build + upload dist artifact
  # ─────────────────────────────────────────────────────────────────────────
  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: ielts-studio-frontend-dist
          path: frontend/dist
          if-no-files-found: error
          retention-days: 7

  # ─────────────────────────────────────────────────────────────────────────
  # Security grep: 防止旧 direct provider 调用、生产代码硬编码 key、前端 key 泄露
  # ─────────────────────────────────────────────────────────────────────────
  security-grep:
    name: Security grep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check legacy direct provider code
        run: |
          # 旧 callDeepSeek / QwenDocumentParseService 已在 Phase 5C-3 清理，不允许复活
          if grep -rnE "callDeepSeek|QwenDocumentParseService" backend/src/main/java; then
            echo "::error::Found legacy direct provider code (callDeepSeek / QwenDocumentParseService). Use OpenAiCompatibleClient instead."
            exit 1
          fi
          echo "OK: no legacy direct provider code"

      - name: Check legacy provider api-key property in production code
        run: |
          # 生产 Java / 前端源码不允许出现 qwen.api-key / mimo.api-key / deepseek.api-key 硬编码
          # （yml 配置中的 api-key 字段名是允许的，这里只扫 main java 与前端 src）
          if grep -rnE "qwen\.api-key|mimo\.api-key|deepseek\.api-key" backend/src/main/java frontend/src; then
            echo "::error::Found legacy provider api-key property in production code."
            exit 1
          fi
          echo "OK: no legacy provider api-key property in production code"

      - name: Check frontend API key local storage
        run: |
          # 前端不允许把 API Key 写入 localStorage / sessionStorage
          if grep -rnE "localStorage.*apiKey|sessionStorage.*apiKey" frontend/src; then
            echo "::error::Frontend must not store API key in localStorage/sessionStorage."
            exit 1
          fi
          echo "OK: frontend does not store API key locally"

      - name: Check frontend debug console.log
        run: |
          # AI settings / usage / admin usage 相关前端代码不允许 console.log（可能泄露 payload）
          # 用 console.log( 匹配实际调用，避免匹配到注释中提到的 "console.log" 字样
          if grep -rnE "console\.log\s*\(" frontend/src/api frontend/src/components/profile frontend/src/views/admin; then
            echo "::error::Unexpected console.log call in AI settings/usage/admin usage frontend code."
            exit 1
          fi
          echo "OK: no console.log in AI settings/usage/admin usage frontend code"
